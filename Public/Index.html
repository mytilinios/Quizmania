<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuizMania 🎮</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;font-family:'Nunito',sans-serif;color:#f0eee8;min-height:100vh;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#2a2a40;border-radius:3px;}
.screen{min-height:100vh;display:flex;flex-direction:column;padding:20px 16px;}
.inner{max-width:520px;width:100%;margin:0 auto;}
.center{align-items:center;justify-content:center;text-align:center;}
.bebas{font-family:'Bebas Neue',sans-serif;}
.accent{color:#f0c040;}
.muted{color:#8884a0;}
.green{color:#3dffa0;}
.red{color:#ff4f6a;}
.purple{color:#c084fc;}

/* Buttons */
.btn-primary{padding:13px 24px;background:#f0c040;color:#000;border:none;border-radius:12px;
  font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform 0.1s;}
.btn-primary:hover{transform:scale(1.03);}
.btn-primary:active{transform:scale(0.97);}
.btn-ghost{padding:12px 24px;background:transparent;color:#8884a0;border:1px solid #2a2a40;
  border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Nunito',sans-serif;}
.btn-ghost:hover{border-color:#8884a0;}
.btn-full{width:100%;display:block;margin-top:10px;}

/* Inputs */
input{width:100%;padding:12px 16px;border-radius:10px;border:2px solid #2a2a40;
  background:#13131c;color:#f0eee8;font-size:15px;font-family:'Nunito',sans-serif;
  outline:none;transition:border-color 0.2s;}
input:focus{border-color:#f0c040;}

/* Cards */
.card{background:#1c1c2e;border-radius:20px;padding:28px;border:1px solid #2a2a40;margin-top:16px;}
.surface{background:#13131c;border-radius:12px;padding:14px 18px;border:1px solid #2a2a40;}

/* Label */
.label{color:#8884a0;font-size:11px;letter-spacing:2px;margin-bottom:8px;
  font-family:'Bebas Neue',sans-serif;display:block;}

/* Player chip */
.chip{display:flex;align-items:center;gap:8px;padding:7px 12px;
  background:#13131c;border-radius:10px;border:1px solid #2a2a40;}

/* Answer buttons */
.ans-btn{background:transparent;border:none;cursor:pointer;font-family:'Nunito',sans-serif;
  border-radius:12px;padding:16px 12px;text-align:left;display:flex;align-items:flex-start;
  gap:10px;transition:transform 0.1s;width:100%;}
.ans-btn:active{transform:scale(0.97);}

/* Animations */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes musicBar{0%{transform:scaleY(0.5);opacity:0.5;}100%{transform:scaleY(1.4);opacity:1;}}
@keyframes pop{0%{transform:scale(0.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
.spinner{width:44px;height:44px;border:4px solid #f0c040;border-top-color:transparent;
  border-radius:50%;animation:spin 1s linear infinite;margin:20px auto;}

/* BG orbs */
.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(60px);opacity:0.06;}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const CATEGORIES = [
  {id:"general",    label:"Γενικές Γνώσεις",        emoji:"🧠"},
  {id:"football",   label:"Ποδόσφαιρο",              emoji:"⚽"},
  {id:"pictionary", label:"Pictionary",               emoji:"🎨"},
  {id:"vocabulary", label:"Λεξιλόγιο",               emoji:"📚"},
  {id:"geography",  label:"Γεωγραφία",               emoji:"🌍"},
  {id:"movies",     label:"Κινηματογράφος & Σειρές", emoji:"🎬"},
  {id:"music",      label:"Μουσική",                  emoji:"🎵"},
  {id:"history",    label:"Ιστορία",                  emoji:"🏛️"},
  {id:"science",    label:"Επιστήμη & Τεχνολογία",   emoji:"🔬"},
  {id:"food",       label:"Φαγητό & Μαγειρική",      emoji:"🍕"},
  {id:"videogames", label:"Video Games",              emoji:"🎮"},
  {id:"animals",    label:"Ζώα & Φύση",              emoji:"🐾"},
  {id:"sports",     label:"Αθλητισμός",               emoji:"🏆"},
  {id:"travel",     label:"Ταξίδια & Χώρες",         emoji:"✈️"},
  {id:"trivia",     label:"Τριβιά & Παράξενα",       emoji:"🧩"},
];
const COLORS = ["#f0c040","#3dffa0","#4fa3ff","#c084fc","#ff4f6a"];
const getColor = i => COLORS[i % 5];
const getTimeLimit = cat => cat==="pictionary"?60:cat==="music"?30:20;
const myId = Math.random().toString(36).slice(2);

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let state = {
  screen: "home",        // home|lobby|waiting|loading|question|reveal|final
  isHost: false,
  room: "",
  players: [],
  category: "general",
  questions: [],
  qIndex: 0,
  timeLeft: 20,
  answers: {},           // {playerId: {answer, timestamp}}
  roundPoints: {},
  myAnswer: undefined,
};
let ws = null;
let timerInterval = null;
let audioEl = null;

// ═══════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════
function connectWS(onOpen) {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = onOpen;
  ws.onmessage = e => handleServerMessage(JSON.parse(e.data));
  ws.onclose = () => {
    setTimeout(() => { if(state.screen !== "home") connectWS(()=>{}); }, 2000);
  };
}

function send(msg) { if(ws && ws.readyState===1) ws.send(JSON.stringify(msg)); }

function handleServerMessage(msg) {
  if(msg.type === "ROOM_CREATED") {
    state.room = msg.room;
    render();
  }
  if(msg.type === "ROOM_JOINED") {
    state.room = msg.room;
    state.screen = "waiting";
    render();
  }
  if(msg.type === "ERROR") {
    alert(msg.message);
  }
  if(msg.type === "PLAYERS_UPDATE") {
    state.players = msg.players;
    render();
  }
  if(msg.type === "CATEGORY_CHANGED") {
    state.category = msg.category;
    render();
  }
  if(msg.type === "GAME_START") {
    state.category = msg.category;
    state.screen = "loading";
    render();
    if(state.isHost) generateAndSend();
  }
  if(msg.type === "QUESTIONS_READY") {
    state.questions = msg.questions;
    state.qIndex = 0;
    state.answers = {};
    state.roundPoints = {};
    state.myAnswer = undefined;
    state.timeLeft = getTimeLimit(msg.category);
    state.screen = "question";
    render();
    startTimer();
    if(state.screen==="question" && msg.category==="music") playPreview();
  }
  if(msg.type === "ANSWER") {
    state.answers[msg.playerId] = {answer: msg.answer, timestamp: msg.timestamp};
    render();
    if(state.isHost && Object.keys(state.answers).length >= state.players.length) {
      clearInterval(timerInterval);
      setTimeout(doReveal, 300);
    }
  }
  if(msg.type === "SHOW_REVEAL") {
    clearInterval(timerInterval);
    stopAudio();
    state.roundPoints = msg.roundPoints;
    state.screen = "reveal";
    render();
  }
  if(msg.type === "NEXT_QUESTION") {
    state.players = msg.players;
    state.qIndex = msg.qIndex;
    state.answers = {};
    state.roundPoints = {};
    state.myAnswer = undefined;
    state.timeLeft = getTimeLimit(msg.category);
    if(msg.qIndex >= msg.total) {
      state.screen = "final";
    } else {
      state.screen = "question";
      startTimer();
      if(msg.category==="music") setTimeout(playPreview, 500);
    }
    render();
  }
}

// ═══════════════════════════════════════════════
// AI QUESTION GENERATION
// ═══════════════════════════════════════════════
async function generateAndSend() {
  const cat = state.category;
  const catLabel = CATEGORIES.find(c=>c.id===cat)?.label || cat;
  let prompt = "";
  if(cat==="pictionary") {
    prompt = `Δημιούργησε 6 λέξεις για Pictionary στα Ελληνικά. Απάντησε ΜΟΝΟ JSON:\n{"questions":[{"word":"...","hint":"κατηγορία","difficulty":"easy/medium/hard"}]}`;
  } else if(cat==="music") {
    prompt = `Δημιούργησε 6 ερωτήσεις μουσικής. Χρησιμοποίησε πραγματικά τραγούδια που υπάρχουν στο iTunes. Ποικιλία: ελληνική μουσική, pop, rock, hip-hop, λαϊκά, έντεχνα. Απάντησε ΜΟΝΟ JSON χωρίς markdown:\n{"questions":[{"q":"Ποιος ερμηνεύει το τραγούδι «ΤΙΤΛΟΣ»;","trackName":"ακριβής τίτλος","artistName":"ακριβές όνομα","options":["α) Σωστός","β) Λάθος1","γ) Λάθος2","δ) Λάθος3"],"answer":0,"fun_fact":"..."}]}`;
  } else {
    prompt = `Δημιούργησε 6 ερωτήσεις πολλαπλής επιλογής για "${catLabel}" στα Ελληνικά. ΜΟΝΟ JSON χωρίς markdown:\n{"questions":[{"q":"...","options":["α)...","β)...","γ)...","δ)..."],"answer":0,"fun_fact":"..."}]}\nΤο answer είναι το index (0-3) της σωστής απάντησης.`;
  }

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,
        messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    const raw = data.content?.map(b=>b.text||"").join("")||"{}";
    const clean = raw.replace(/```json|```/g,"").trim();
    const parsed = JSON.parse(clean);

    if(cat==="music" && parsed.questions) {
      for(const q of parsed.questions) {
        q.previewUrl = await fetchPreview(q.trackName, q.artistName);
      }
    }

    send({type:"QUESTIONS_READY", questions: parsed.questions||[], category: cat});
    // also apply locally
    state.questions = parsed.questions||[];
    state.qIndex = 0; state.answers = {}; state.roundPoints = {}; state.myAnswer = undefined;
    state.timeLeft = getTimeLimit(cat);
    state.screen = "question";
    render(); startTimer();
    if(cat==="music") setTimeout(playPreview, 500);
  } catch(e) {
    alert("Σφάλμα AI: " + e.message);
    state.screen = "lobby"; render();
  }
}

async function fetchPreview(track, artist) {
  try {
    const q = encodeURIComponent(`${track} ${artist}`);
    const r = await fetch(`https://itunes.apple.com/search?term=${q}&media=music&limit=1`);
    const d = await r.json();
    return d.results?.[0]?.previewUrl || null;
  } catch { return null; }
}

// ═══════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════
function computeRoundPoints() {
  const q = state.questions[state.qIndex];
  const isPic = state.category==="pictionary";
  const total = state.players.length;
  const correct = state.players
    .map(p => {
      const a = state.answers[p.id];
      if(!a) return null;
      const ok = isPic
        ? a.answer?.toLowerCase().trim()===q.word?.toLowerCase().trim()
        : a.answer===q.answer;
      return ok ? {id:p.id, ts:a.timestamp} : null;
    })
    .filter(Boolean)
    .sort((a,b)=>a.ts-b.ts);
  const pts = {};
  state.players.forEach(p => pts[p.id]=0);
  correct.forEach((c,i) => pts[c.id] = Math.max(0, total-1-i));
  return pts;
}

function doReveal() {
  const pts = computeRoundPoints();
  state.roundPoints = pts;
  state.screen = "reveal";
  stopAudio();
  send({type:"SHOW_REVEAL", roundPoints:pts});
  render();
}

// ═══════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    state.timeLeft--;
    updateTimerDisplay();
    if(state.timeLeft<=0){
      clearInterval(timerInterval);
      if(state.isHost) doReveal();
    }
  },1000);
}

function updateTimerDisplay() {
  const el = document.getElementById("countdown-num");
  const ring = document.getElementById("countdown-ring");
  if(!el) return;
  el.textContent = state.timeLeft;
  const total = getTimeLimit(state.category);
  const r=28, circ=2*Math.PI*r;
  const offset = circ*(1-state.timeLeft/total);
  if(ring) ring.style.strokeDashoffset = offset;
  const color = state.timeLeft<=5?"#ff4f6a":state.timeLeft<=10?"#f0c040":"#3dffa0";
  el.style.color = color;
  if(ring) ring.style.stroke = color;
}

// ═══════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════
function playPreview() {
  const q = state.questions[state.qIndex];
  if(!q?.previewUrl) return;
  stopAudio();
  audioEl = new Audio(q.previewUrl);
  audioEl.volume = 0.8;
  audioEl.play().catch(()=>{});
}
function stopAudio() {
  if(audioEl){ audioEl.pause(); audioEl=null; }
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function avatar(name, color, size=36) {
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color}33;
    border:2px solid ${color};display:flex;align-items:center;justify-content:center;
    font-size:${size*0.42}px;font-weight:700;color:${color};flex-shrink:0;
    font-family:'Bebas Neue',sans-serif;">${(name||"?")[0].toUpperCase()}</div>`;
}

function countdownRing() {
  const total = getTimeLimit(state.category);
  const r=28, circ=2*Math.PI*r;
  const offset = circ*(1-state.timeLeft/total);
  const color = state.timeLeft<=5?"#ff4f6a":state.timeLeft<=10?"#f0c040":"#3dffa0";
  return `<div style="position:relative;width:72px;height:72px;flex-shrink:0;">
    <svg width="72" height="72" style="transform:rotate(-90deg);">
      <circle cx="36" cy="36" r="${r}" fill="none" stroke="#2a2a40" stroke-width="5"/>
      <circle id="countdown-ring" cx="36" cy="36" r="${r}" fill="none" stroke="${color}" stroke-width="5"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
        style="transition:stroke-dashoffset 1s linear,stroke 0.3s;"/>
    </svg>
    <span id="countdown-num" style="position:absolute;inset:0;display:flex;align-items:center;
      justify-content:center;font-size:22px;font-weight:800;color:${color};
      font-family:'Bebas Neue',sans-serif;">${state.timeLeft}</span>
  </div>`;
}

function orbsBg() {
  const positions = [[10,20],[60,70],[30,50],[80,10],[5,80],[55,40]];
  const colors = ["#f0c040","#c084fc","#4fa3ff"];
  return positions.map(([l,t],i)=>`<div class="orb" style="width:${300+i*80}px;height:${300+i*80}px;
    background:${colors[i%3]};left:${l}%;top:${t}%;transform:translate(-50%,-50%);"></div>`).join("");
}

// ═══════════════════════════════════════════════
// SCREENS
// ═══════════════════════════════════════════════
function renderHome() {
  return `
  <div class="screen center" style="position:relative;">
    ${orbsBg()}
    <div style="position:relative;z-index:1;max-width:440px;width:100%;text-align:center;">
      <div style="font-size:56px;margin-bottom:8px;">🎮</div>
      <h1 class="bebas accent" style="font-size:52px;letter-spacing:4px;line-height:1;">QUIZMANIA</h1>
      <p class="muted" style="font-size:14px;margin:6px 0 32px;">Multiplayer Quiz με AI, Μουσική & Σύστημα Ταχύτητας</p>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;">
        <button class="btn-primary" style="font-size:16px;padding:15px 28px;" onclick="showHostForm()">🎯 Δημιουργία Δωματίου</button>
        <button class="btn-ghost" style="font-size:16px;padding:15px 28px;" onclick="showJoinForm()">🔑 Είσοδος</button>
      </div>
      <div id="form-area"></div>
    </div>
  </div>`;
}

function showHostForm() {
  document.getElementById("form-area").innerHTML = `
    <div class="card">
      <span class="label">ΔΗΜΙΟΥΡΓΙΑ ΔΩΜΑΤΙΟΥ</span>
      <input id="host-name" placeholder="Το όνομά σου" maxlength="20"/>
      <button class="btn-primary btn-full" onclick="doHost()">Δημιουργία →</button>
      <button class="btn-ghost btn-full" onclick="document.getElementById('form-area').innerHTML=''">Πίσω</button>
    </div>`;
  setTimeout(()=>document.getElementById("host-name")?.focus(),100);
}

function showJoinForm() {
  document.getElementById("form-area").innerHTML = `
    <div class="card">
      <span class="label">ΕΙΣΟΔΟΣ ΣΤΟ ΔΩΜΑΤΙΟ</span>
      <input id="join-code" placeholder="Κωδικός (π.χ. AB3X9)" maxlength="5"
        style="letter-spacing:6px;font-family:'Bebas Neue',sans-serif;font-size:22px;text-transform:uppercase;"
        oninput="this.value=this.value.toUpperCase()"/>
      <input id="join-name" placeholder="Το όνομά σου" maxlength="20" style="margin-top:10px;"/>
      <button class="btn-primary btn-full" onclick="doJoin()">Σύνδεση →</button>
      <button class="btn-ghost btn-full" onclick="document.getElementById('form-area').innerHTML=''">Πίσω</button>
    </div>`;
  setTimeout(()=>document.getElementById("join-code")?.focus(),100);
}

function doHost() {
  const name = document.getElementById("host-name")?.value.trim();
  if(!name) return;
  state.isHost = true;
  state.players = [{id:myId,name,isHost:true,score:0,colorIdx:0}];
  connectWS(()=>{
    send({type:"CREATE_ROOM", playerId:myId, name});
    state.screen = "lobby";
    render();
  });
}

function doJoin() {
  const code = document.getElementById("join-code")?.value.trim().toUpperCase();
  const name = document.getElementById("join-name")?.value.trim();
  if(!code||!name) return;
  state.isHost = false;
  connectWS(()=>{
    send({type:"JOIN_ROOM", playerId:myId, name, room:code});
  });
}

function renderLobby() {
  const catButtons = CATEGORIES.map(cat=>`
    <button onclick="selectCategory('${cat.id}')"
      style="padding:9px 13px;border-radius:10px;cursor:pointer;text-align:left;
        border:2px solid ${state.category===cat.id?"#f0c040":"#2a2a40"};
        background:${state.category===cat.id?"#f0c04022":"#13131c"};
        color:#f0eee8;font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;
        display:flex;align-items:center;gap:8px;transition:all 0.15s;width:100%;">
      <span>${cat.emoji}</span><span>${cat.label}</span>
    </button>`).join("");

  const playerChips = state.players.map(p=>`
    <div class="chip">
      ${avatar(p.name, getColor(p.colorIdx), 28)}
      <span style="font-size:13px;font-weight:600;">${p.name}</span>
      ${p.isHost?'<span style="color:#f0c040;font-size:10px;">HOST</span>':""}
    </div>`).join("");

  return `
  <div class="screen">
    <div class="inner">
      <div style="text-align:center;margin-bottom:24px;">
        <span class="label">ΚΩΔΙΚΟΣ ΔΩΜΑΤΙΟΥ</span>
        <div class="bebas accent" style="font-size:64px;letter-spacing:12px;line-height:1.1;">${state.room}</div>
        <p class="muted" style="font-size:13px;">Μοιραστείτε τον κωδικό με τους παίκτες</p>
      </div>

      <span class="label">ΕΠΙΛΟΓΗ ΚΑΤΗΓΟΡΙΑΣ</span>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;
        max-height:240px;overflow-y:auto;margin-bottom:6px;">${catButtons}</div>
      <p style="color:#f0c040;font-size:13px;margin-bottom:16px;">
        ✓ ${CATEGORIES.find(c=>c.id===state.category)?.label}
        ${state.category==="music"?" — 🎵 30 δευτ. / ερώτηση":""}
      </p>

      <div class="surface" style="margin-bottom:16px;">
        <p style="color:#f0c040;font-size:12px;font-weight:700;margin-bottom:4px;">⚡ ΣΥΣΤΗΜΑ ΠΟΝΤΩΝ ΤΑΧΥΤΗΤΑΣ</p>
        <p class="muted" style="font-size:12px;line-height:1.7;">
          Αν παίζουν <strong style="color:#f0eee8;">N παίκτες</strong>:
          1ος σωστός = <strong style="color:#f0eee8;">N-1 πόντοι</strong>,
          2ος = N-2, ..., τελευταίος σωστός = <strong style="color:#ff4f6a;">0 πόντοι</strong>.
        </p>
      </div>

      <span class="label">ΠΑΙΚΤΕΣ (${state.players.length})</span>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;">${playerChips}</div>

      <button class="btn-primary" style="width:100%;font-size:17px;padding:16px;" onclick="startGame()">
        🚀 Έναρξη Παιχνιδιού
      </button>
    </div>
  </div>`;
}

function selectCategory(id) {
  state.category = id;
  send({type:"CATEGORY_CHANGE", category:id});
  render();
}

function startGame() {
  send({type:"GAME_START", category:state.category});
  state.screen = "loading";
  render();
  generateAndSend();
}

function renderWaiting() {
  const chips = state.players.map(p=>`
    <div class="chip">
